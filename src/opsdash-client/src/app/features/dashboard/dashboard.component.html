<div class="dashboard">
  @if (loading()) {
    <mat-progress-bar mode="indeterminate" />
  }

  <div class="row row-1">
    <div class="col health-col">
      <app-health-score [healthScore]="healthScore()" />
    </div>
    <div class="col kpi-col">
      <mat-card class="panel" appearance="outlined">
        <mat-card-content>
          <h2 class="section-title">Key metrics</h2>
          <app-kpi-summary
            [summaries]="summaries()"
            [selectedCategory]="filterCategory()"
            [selectedMetricName]="chartMetricName()"
            (cardSelected)="onKpiSelect($event)"
          />
        </mat-card-content>
      </mat-card>
    </div>
  </div>

  <mat-card class="panel filters-panel" appearance="outlined">
    <mat-card-content>
      <app-dashboard-filter-bar
        [categories]="categories()"
        [(startDate)]="filterStart"
        [(endDate)]="filterEnd"
        [(category)]="filterCategory"
        (refresh)="onRefresh()"
      />
    </mat-card-content>
  </mat-card>

  <div class="row row-3">
    <mat-card class="panel chart-panel" appearance="outlined">
      <mat-card-content>
        <h2 class="section-title">{{ chartMetricName() || 'Metric' }} — history</h2>
        <div class="chart-block">
          <app-metric-chart [metricName]="chartMetricName()" [historyData]="chartHistory()" [anomalies]="chartAnomalies()" />
        </div>
        <h3 class="sub-title">Forecast</h3>
        <div class="chart-block chart-block--forecast">
          <app-forecast-chart [metricName]="chartMetricName()" [historyData]="chartHistory()" />
        </div>
      </mat-card-content>
    </mat-card>
    <div class="side-stack">
      <mat-card class="panel" appearance="outlined">
        <mat-card-content>
          <app-anomaly-feed [anomalies]="anomalies()" (anomalyClick)="onAnomalyClick($event)" />
        </mat-card-content>
      </mat-card>
      <mat-card class="panel incidents-panel" appearance="outlined">
        <mat-card-content>
          <h3 class="section-title">Recent incidents</h3>
          @if (incidents().length === 0) {
            <p class="muted">No recent incidents</p>
          } @else {
            <ul class="incident-list">
              @for (i of incidents(); track i.id) {
                <li>
                  <a routerLink="/incidents">{{ i.title }}</a>
                  <span class="muted small">{{ i.severity }} · {{ i.status }}</span>
                </li>
              }
            </ul>
          }
        </mat-card-content>
      </mat-card>
    </div>
  </div>

  <div class="metrics-region">
    <app-dashboard-metrics-table
    [rows]="tableRows()"
    [totalCount]="tableTotal()"
    [pageIndex]="tablePageIndex()"
    [pageSize]="tablePageSize()"
    [loading]="loading()"
    [categoryFilter]="filterCategory()"
    [sortActive]="tableSortActive()"
    [sortDirection]="tableSortDirection()"
    (pageChange)="onTablePage($event)"
    (sortChange)="onTableSort($event)"
    />
  </div>
</div>
