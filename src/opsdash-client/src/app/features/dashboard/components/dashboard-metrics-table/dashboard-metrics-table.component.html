<div class="table-head">
  <h3>Metric readings</h3>
  @if (categoryFilter(); as cat) {
    <span class="chip">Category: {{ cat }}</span>
  } @else {
    <span class="chip muted">All categories</span>
  }
</div>

@if (loading()) {
  <div class="loading">
    <mat-spinner diameter="36" />
  </div>
} @else {
  <div class="table-wrap mat-elevation-z1">
    <table mat-table [dataSource]="rows()" matSort [matSortActive]="sortActive()" [matSortDirection]="sortDirection()" (matSortChange)="onSort($event)">
      <ng-container matColumnDef="metricName">
        <th mat-header-cell *matHeaderCellDef mat-sort-header="metricName">Metric name</th>
        <td mat-cell *matCellDef="let row">{{ formatTitle(row.metricName) }}</td>
      </ng-container>

      <ng-container matColumnDef="category">
        <th mat-header-cell *matHeaderCellDef mat-sort-header="category">Category</th>
        <td mat-cell *matCellDef="let row">{{ row.category }}</td>
      </ng-container>

      <ng-container matColumnDef="metricValue">
        <th mat-header-cell *matHeaderCellDef mat-sort-header="metricValue">Value</th>
        <td mat-cell *matCellDef="let row">{{ displayValue(row) }}</td>
      </ng-container>

      <ng-container matColumnDef="recordedAt">
        <th mat-header-cell *matHeaderCellDef mat-sort-header="recordedAt">Recorded at</th>
        <td mat-cell *matCellDef="let row">{{ displayRecorded(row.recordedAt) }}</td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>
  </div>

  <mat-paginator
    [length]="totalCount()"
    [pageIndex]="pageIndex()"
    [pageSize]="pageSize()"
    [pageSizeOptions]="[10, 25, 50, 100]"
    showFirstLastButtons
    (page)="onPage($event)"
  />
}
