<div class="dashboard">
  @if (loading()) {
    <mat-progress-bar mode="indeterminate" />
  }

  <div class="row row-1">
    <div class="col health-col">
      <app-health-score />
    </div>
    <div class="col kpi-col">
      <mat-card class="panel" appearance="outlined">
        <mat-card-content>
          <h2 class="section-title">Key metrics</h2>
          <app-kpi-summary
            [summaries]="summaries()"
            [selectedCategory]="filterCategory()"
            [selectedMetricName]="chartMetricName()"
            (cardSelected)="onKpiSelect($event)"
          />
        </mat-card-content>
      </mat-card>
    </div>
  </div>

  <mat-card class="panel filters-panel" appearance="outlined">
    <mat-card-content>
      <app-dashboard-filter-bar
        [categories]="categories()"
        [(startDate)]="filterStart"
        [(endDate)]="filterEnd"
        [(category)]="filterCategory"
        (refresh)="onRefresh()"
      />
    </mat-card-content>
  </mat-card>

  <div class="row row-3">
    <mat-card class="panel chart-panel chart-panel--metric" appearance="outlined">
      <mat-card-content>
        <h2 class="section-title">{{ chartMetricName() || 'Metric' }} — history</h2>
        <div class="chart-block">
          <app-metric-chart
            [metricName]="chartMetricName()"
            [historyData]="chartHistory()"
            [anomalies]="chartAnomalies()"
          />
        </div>
      </mat-card-content>
    </mat-card>
    <div class="side-stack">
      <mat-card class="panel feed-card" appearance="outlined">
        <mat-card-content>
          <app-anomaly-feed [anomalies]="anomalies()" />
        </mat-card-content>
      </mat-card>
      <mat-card class="panel incidents-card" appearance="outlined">
        <mat-card-content>
          <app-recent-incidents-panel [incidents]="incidents()" />
        </mat-card-content>
      </mat-card>
    </div>
  </div>

  <div class="row row-4">
    <mat-card class="panel forecast-panel" appearance="outlined">
      <mat-card-content>
        <h2 class="section-title">Forecast — {{ chartMetricName() || 'metric' }}</h2>
        <div class="forecast-toolbar">
          <span class="muted">Method</span>
          <mat-button-toggle-group
            [value]="forecastMethod()"
            (change)="onForecastMethodChange($event)"
            aria-label="Forecast method"
          >
            <mat-button-toggle value="WMA">WMA</mat-button-toggle>
            <mat-button-toggle value="LinearRegression">Linear regression</mat-button-toggle>
          </mat-button-toggle-group>
        </div>
        <div class="chart-block chart-block--forecast">
          <app-forecast-chart
            [metricName]="chartMetricName()"
            [historyData]="chartHistory()"
            [forecastData]="chartForecast()"
          />
        </div>
      </mat-card-content>
    </mat-card>
  </div>

  <div class="metrics-region">
    <app-dashboard-metrics-table
      [rows]="tableRows()"
      [totalCount]="tableTotal()"
      [pageIndex]="tablePageIndex()"
      [pageSize]="tablePageSize()"
      [loading]="loading()"
      [categoryFilter]="filterCategory()"
      [sortActive]="tableSortActive()"
      [sortDirection]="tableSortDirection()"
      (pageChange)="onTablePage($event)"
      (sortChange)="onTableSort($event)"
    />
  </div>
</div>
